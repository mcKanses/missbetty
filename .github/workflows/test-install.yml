name: Test install.sh

on:
  pull_request:
    paths:
      - 'install.sh'
  push:
    paths:
      - 'install.sh'

jobs:
  pipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test install.sh (pipe-compatible, as in README)
        run: |
          curl -fsSL file://$PWD/install.sh | sudo sh
          # Test with version pinning
          BETTY_SKIP_DEPS=true curl -fsSL file://$PWD/install.sh | sudo sh

  direct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test install.sh (direct execution, syntax only)
        run: |
          chmod +x install.sh
          BETTY_SKIP_DEPS=true ./install.sh
