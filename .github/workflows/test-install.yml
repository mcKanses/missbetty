name: Test install.sh

on:
  pull_request:
    paths:
      - 'install.sh'
  push:
    paths:
      - 'install.sh'

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test install.sh (pipe-kompatibel, wie README)
        run: |
          curl -fsSL file://$PWD/install.sh | sudo sh
          # Test mit Version Pinning
          BETTY_SKIP_DEPS=true curl -fsSL file://$PWD/install.sh | sudo sh
