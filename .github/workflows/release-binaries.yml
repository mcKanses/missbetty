name: Release Binaries

on:
  workflow_run:
    workflows: [Publish]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  resolve-release:
    name: Resolve Release
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Resolve tag name
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'release')
              return core.setOutput('tag_name', context.payload.release.tag_name)

            const { data: latestRelease } = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })

            core.setOutput('tag_name', latestRelease.tag_name)

  build-and-upload:
    needs: resolve-release
    if: needs.resolve-release.outputs.tag_name != ''
    name: Build Binary (${{ matrix.asset_name }})
    runs-on: ${{ matrix.runs_on }}
    env:
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm-cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            asset_name: betty-linux-x64.tar.gz
            binary_name: betty
            archive_kind: tar
            smoke_test: true
          - runs_on: ubuntu-24.04-arm
            asset_name: betty-linux-arm64.tar.gz
            binary_name: betty
            archive_kind: tar
            smoke_test: true
          - runs_on:
              - self-hosted
              - macOS
              - betty-macos13
            self_hosted: true
            asset_name: betty-darwin-x64.tar.gz
            binary_name: betty
            archive_kind: tar
            target_node_dist: darwin-x64
            target_node_binary: bin/node
            smoke_test: false
          - runs_on: macos-latest
            asset_name: betty-darwin-arm64.tar.gz
            binary_name: betty
            archive_kind: tar
            smoke_test: true
          - runs_on: windows-latest
            asset_name: betty-windows-x64.zip
            binary_name: betty.exe
            archive_kind: zip
            smoke_test: true
          - runs_on: windows-latest
            asset_name: betty-windows-arm64.zip
            binary_name: betty.exe
            archive_kind: zip
            target_node_dist: win-arm64
            target_node_binary: node.exe
            smoke_test: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set binary version from release tag
        shell: bash
        run: |
          RELEASE_VERSION="${{ needs.resolve-release.outputs.tag_name }}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"

          node -e "const fs=require('fs'); const path='package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(path, JSON.stringify(pkg, null, 2)+'\\n');" "$RELEASE_VERSION"

      - name: Prepare target Node runtime (tar)
        if: matrix.target_node_dist != '' && matrix.archive_kind == 'tar'
        shell: bash
        run: |
          NODE_VERSION="$(node -p 'process.version.slice(1)')"
          ARCHIVE="node-v${NODE_VERSION}-${{ matrix.target_node_dist }}.tar.gz"
          URL="https://nodejs.org/dist/v${NODE_VERSION}/${ARCHIVE}"

          mkdir -p .node-runtime
          curl -fsSL "$URL" -o .node-runtime/node.tar.gz
          tar -xzf .node-runtime/node.tar.gz -C .node-runtime --strip-components=1
          echo "BETTY_SEA_NODE_BINARY=$PWD/.node-runtime/${{ matrix.target_node_binary }}" >> "$GITHUB_ENV"

      - name: Prepare target Node runtime (zip)
        if: matrix.target_node_dist != '' && matrix.archive_kind == 'zip'
        shell: pwsh
        run: |
          $nodeVersion = node -p "process.version.slice(1)"
          $archive = "node-v$nodeVersion-${{ matrix.target_node_dist }}.zip"
          $url = "https://nodejs.org/dist/v$nodeVersion/$archive"

          New-Item -ItemType Directory -Force -Path .node-runtime | Out-Null
          Invoke-WebRequest -Uri $url -OutFile .node-runtime\node.zip
          Expand-Archive -Path .node-runtime\node.zip -DestinationPath .node-runtime\expanded -Force
          $root = Get-ChildItem -Path .node-runtime\expanded | Select-Object -First 1
          $targetNode = Join-Path $root.FullName '${{ matrix.target_node_binary }}'
          "BETTY_SEA_NODE_BINARY=$targetNode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build standalone binary
        run: npm run binary

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Package binary (tar)
        if: matrix.archive_kind == 'tar'
        shell: bash
        run: |
          mkdir -p release
          cp "dist/${{ matrix.binary_name }}" release/
          tar -C release -czf "${{ matrix.asset_name }}" "${{ matrix.binary_name }}"

      - name: Create checksum (tar)
        if: matrix.archive_kind == 'tar'
        shell: bash
        run: |
          shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Sign assets (tar)
        if: matrix.archive_kind == 'tar'
        shell: bash
        run: |
          cosign sign-blob --yes --output-signature "${{ matrix.asset_name }}.sig" --output-certificate "${{ matrix.asset_name }}.pem" "${{ matrix.asset_name }}"
          cosign sign-blob --yes --output-signature "${{ matrix.asset_name }}.sha256.sig" --output-certificate "${{ matrix.asset_name }}.sha256.pem" "${{ matrix.asset_name }}.sha256"

      - name: Package binary (zip)
        if: matrix.archive_kind == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/${{ matrix.binary_name }}" "release/${{ matrix.binary_name }}"
          Compress-Archive -Path "release/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.asset_name }}" -Force

      - name: Create checksum (zip)
        if: matrix.archive_kind == 'zip'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset_name }}").Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}" | Out-File -FilePath "${{ matrix.asset_name }}.sha256" -Encoding ascii

      - name: Sign assets (zip)
        if: matrix.archive_kind == 'zip'
        shell: pwsh
        run: |
          cosign sign-blob --yes --output-signature "${{ matrix.asset_name }}.sig" --output-certificate "${{ matrix.asset_name }}.pem" "${{ matrix.asset_name }}"
          cosign sign-blob --yes --output-signature "${{ matrix.asset_name }}.sha256.sig" --output-certificate "${{ matrix.asset_name }}.sha256.pem" "${{ matrix.asset_name }}.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag_name }}
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
            ${{ matrix.asset_name }}.sig
            ${{ matrix.asset_name }}.pem
            ${{ matrix.asset_name }}.sha256.sig
            ${{ matrix.asset_name }}.sha256.pem
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Smoke test installer (Linux/macOS)
        if: matrix.archive_kind == 'tar' && matrix.smoke_test == true
        shell: bash
        run: |
          export BETTY_VERSION="${{ needs.resolve-release.outputs.tag_name }}"
          export BETTY_INSTALL_DIR="$RUNNER_TEMP/betty-bin"
          mkdir -p "$BETTY_INSTALL_DIR"

          for attempt in 1 2 3 4 5; do
            if sh ./install.sh; then
              break
            fi

            if [ "$attempt" = "5" ]; then
              echo "Installer smoke test failed after retries."
              exit 1
            fi

            echo "Retrying installer smoke test ($attempt/5)..."
            sleep 5
          done

          "$BETTY_INSTALL_DIR/betty" --help > /dev/null

      - name: Smoke test installer (Windows)
        if: matrix.archive_kind == 'zip' && matrix.smoke_test == true
        shell: pwsh
        run: |
          $env:BETTY_VERSION = '${{ needs.resolve-release.outputs.tag_name }}'
          $env:BETTY_INSTALL_DIR = Join-Path $env:RUNNER_TEMP 'betty-bin'
          New-Item -ItemType Directory -Force -Path $env:BETTY_INSTALL_DIR | Out-Null

          $installed = $false
          for ($i = 1; $i -le 5; $i++) {
            try {
              pwsh -NoProfile -ExecutionPolicy Bypass -File ./install.ps1
              $installed = $true
              break
            }
            catch {
              if ($i -eq 5) { throw }
              Write-Host "Retrying installer smoke test ($i/5)..."
              Start-Sleep -Seconds 5
            }
          }

          if (-not $installed) { throw 'Installer smoke test failed.' }

          & (Join-Path $env:BETTY_INSTALL_DIR 'betty.exe') --help | Out-Null

  update-readme:
    needs: [resolve-release, build-and-upload]
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    name: Update README with Latest Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update README version examples
        run: node scripts/update-readme-version.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}