name: Main Source Guard

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited]

jobs:
  enforce-main-from-development:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source and target branch
        env:
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "$BASE_BRANCH" = "development" ]; then
            echo "PR target branch is development. Allowing."
            exit 0
          fi

          if [ "$SOURCE_BRANCH" = "development" ]; then
            echo "PR source branch is development."
            exit 0
          fi

          echo "Only PRs from development to main are allowed."
          echo "Current source branch: $SOURCE_BRANCH"
          echo "Current target branch: $BASE_BRANCH"
          exit 1